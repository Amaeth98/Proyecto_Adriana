services:
  react:
    image: adri/react:latest
    container_name: ctl_react
    build:
      context: ${CONTEXTO}
      dockerfile: ./dockerfiles/4react/dockerfile
    env_file:
      - .env
    ports:
      - ${PORT_REACT}:3000
    volumes:
      - ./logs/react:/root/logs
    networks:
      - red_adriana
    restart: always

  inicio:
    image: adri/inicio:latest
    container_name: ctl_inicio
    build:
      context: ${CONTEXTO}
      dockerfile: ./dockerfiles/5inicio/dockerfile
    depends_on:
      - react
    env_file:
      - .env
    ports:
      - ${PORT_NODE}:3000
      - ${PORT_WWW}:80
      - ${PORT_SSH}:22
    volumes:
      - ./logs/inicio:/root/logs
    networks:
      - red_adriana
    restart: always

networks:
  red_adriana:
    external: true
